<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLSZ Faloda - Fizetések</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to bottom, #1a1a1a 10%, #343333 25%); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; padding-top: 70px; }
        .sidebar { position: fixed; left: 0; top: 70px; width: 250px; height: calc(100vh - 70px); background: linear-gradient(180deg, #2c2c2c 0%, #1a1a1a 100%); padding: 2rem 0; box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5); overflow-y: auto; z-index: 100; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-item { margin-bottom: 0.5rem; }
        .sidebar-link { display: flex; align-items: center; padding: 1rem 1.5rem; color: #cccccc; text-decoration: none; transition: all 0.3s; font-weight: 500; border-left: 3px solid transparent; }
        .sidebar-link:hover { background: rgba(255, 193, 7, 0.1); color: #ffffff; border-left-color: #ffc107; }
        .sidebar-link.active { background: rgba(255, 193, 7, 0.15); color: #ffc107; border-left-color: #ffc107; }
        .sidebar-icon { font-size: 1.3rem; margin-right: 1rem; width: 25px; text-align: center; }
        .main-content { margin-left: 250px; transition: margin-left 0.3s; }
        .sidebar-toggle { display: none; position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #ffc107; color: #000; border: none; border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4); z-index: 1000; }
        .navbar { background-color: rgba(0, 0, 0, 0.9) !important; padding: 1rem 0; }
        .navbar-brand { font-size: 1.5rem; font-weight: 600; color: #ffffff !important; }
        .navbar-nav .nav-link { color: #cccccc !important; margin: 0 1rem; transition: color 0.3s; }
        .navbar-nav .nav-link:hover { color: #ffffff !important; }
        .dashboard-section { padding: 60px 0; }
        .page-title { font-size: 2.5rem; font-weight: 700; color: #ffc107; margin-bottom: 3rem; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: linear-gradient(135deg, #2a2a2a, #3a3a3a); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin-bottom: 0.8rem; }
        .stat-icon.green { background-color: #27ae60; }
        .stat-icon.blue { background-color: #3498db; }
        .stat-icon.purple { background-color: #9b59b6; }
        .stat-icon.orange { background-color: #e67e22; }
        .stat-label { color: #cccccc; font-size: 0.85rem; margin-bottom: 0.3rem; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #ffffff; }
        .payments-card { background: #2a2a2a; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
        .payments-title { font-size: 1.5rem; font-weight: 600; color: #ffffff; margin-bottom: 2rem; }
        .filter-section { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 0.6rem 1.2rem; border-radius: 6px; border: 2px solid #444; background: transparent; color: #cccccc; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .filter-btn:hover { border-color: #ffc107; color: #ffc107; }
        .filter-btn.active { background: #ffc107; border-color: #ffc107; color: #000; }
        .payments-list { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .payments-list::-webkit-scrollbar { width: 8px; }
        .payments-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 10px; }
        .payments-list::-webkit-scrollbar-thumb { background: #ffc107; border-radius: 10px; }
        .payment-item { background: #3a3a3a; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; transition: background 0.3s; flex-wrap: wrap; }
        .payment-item:hover { background: #4a4a4a; }
        .payment-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #27ae60, #2ecc71); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
        .payment-info { flex: 1; min-width: 150px; }
        .payment-customer { font-weight: 600; color: #ffffff; margin-bottom: 0.3rem; font-size: 1rem; }
        .payment-date { color: #aaa; font-size: 0.85rem; }
        .payment-order { color: #ffc107; font-size: 0.85rem; }
        .payment-amount { font-weight: 700; color: #27ae60; font-size: 1.2rem; min-width: 120px; text-align: right; }
        .payment-method { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-align: center; min-width: 100px; }
        .payment-method.card { background-color: #1a1f71; color: white; }
        .payment-method.cash { background-color: #27ae60; color: white; }
        .payment-method.paypal { background-color: #0070ba; color: white; }
        .payment-status { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-align: center; min-width: 100px; }
        .status-pending { background-color: #f39c12; color: white; }
        .status-paid { background-color: #27ae60; color: white; }
        .status-failed { background-color: #e74c3c; color: white; }
        .empty-state { text-align: center; padding: 3rem; color: #aaa; }
        .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; }
        footer { background-color: #1a1a1a; padding: 30px 0; text-align: center; border-top: 1px solid #333333; margin-top: 4rem; }
        footer p { margin: 0.5rem 0; color: #cccccc; }
        footer a { color: #ffc107; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: #ffb300; text-decoration: underline; }
        @media (max-width: 991px) { .sidebar { transform: translateX(-100%); transition: transform 0.3s; } .sidebar.show { transform: translateX(0); } .main-content { margin-left: 0; } .sidebar-toggle { display: flex; align-items: center; justify-content: center; } }
        @media (max-width: 768px) { .page-title { font-size: 2rem; } .stats-grid { grid-template-columns: 1fr 1fr; } .payment-item { flex-direction: column; align-items: flex-start; } .payment-amount { text-align: left; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">KLSZ Faloda</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Főoldal</a></li>
                    <li class="nav-item"><a class="nav-link" href="registration.html">Regisztráció</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Kosár</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-item"><a href="admin-dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span><span>Dashboard</span></a></li>
            <li class="sidebar-item"><a href="admin-orders.html" class="sidebar-link"><span class="sidebar-icon">📦</span><span>Rendelések</span></a></li>
            <li class="sidebar-item"><a href="admin-users.html" class="sidebar-link"><span class="sidebar-icon">👥</span><span>Felhasználók</span></a></li>
            <li class="sidebar-item"><a href="admin-payments.html" class="sidebar-link active"><span class="sidebar-icon">💳</span><span>Fizetések</span></a></li>
        </ul>
    </aside>
    <button class="sidebar-toggle" id="sidebarToggle">☰</button>
    <div class="main-content">
        <section class="dashboard-section">
            <div class="container">
                <h1 class="page-title">Fizetések</h1>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon green">💵</div><div class="stat-label">Összes bevétel</div><div class="stat-value" id="totalRevenue">0 Ft</div></div>
                    <div class="stat-card"><div class="stat-icon blue">📅</div><div class="stat-label">Mai bevétel</div><div class="stat-value" id="todayRevenue">0 Ft</div></div>
                    <div class="stat-card"><div class="stat-icon purple">✅</div><div class="stat-label">Sikeres fizetések</div><div class="stat-value" id="successfulPayments">0</div></div>
                    <div class="stat-card"><div class="stat-icon orange">⏳</div><div class="stat-label">Függőben lévő</div><div class="stat-value" id="pendingPayments">0</div></div>
                </div>
                <div class="row justify-content-center">
                    <div class="col-lg-10 col-xl-9">
                        <div class="payments-card">
                            <h2 class="payments-title">Fizetési előzmények</h2>
                            <div class="filter-section">
                                <button class="filter-btn active" data-filter="all">Összes</button>
                                <button class="filter-btn" data-filter="paid">Sikeres</button>
                                <button class="filter-btn" data-filter="pending">Függőben</button>
                                <button class="filter-btn" data-filter="failed">Sikertelen</button>
                            </div>
                            <div class="payments-list" id="paymentsList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <footer><div class="container"><p>© 2025 KLSZ Faloda</p><div><a href="#">ÁSZF</a><span style="color: #666;">|</span><a href="#">Kapcsolat</a></div></div></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('show'));
        
        // JAVÍTOTT API URL - a backend-hez igazítva
        const API_BASE = 'http://localhost:8080/vizsgaremek1/webresources';
        
        let payments = [], orders = [], users = [], currentFilter = 'all';

        async function loadData() {
            try {
                // JAVÍTOTT VÉGPONTOK
                const [paymentsRes, ordersRes, usersRes] = await Promise.all([
                    fetch(`${API_BASE}/payments/GetAllPayments`), 
                    fetch(`${API_BASE}/orders/GetAllOrders`), 
                    fetch(`${API_BASE}/users/GetAllUsers`)
                ]);
                if (paymentsRes.ok) payments = await paymentsRes.json();
                if (ordersRes.ok) orders = await ordersRes.json();
                if (usersRes.ok) users = await usersRes.json();
                calculateStats();
                renderPayments();
            } catch (e) { 
                console.error('Hiba az adatok betöltésekor:', e); 
            }
        }

        function calculateStats() {
            const today = new Date().toISOString().split('T')[0];
            let totalRevenue = 0, todayRevenue = 0, successfulPayments = 0, pendingPayments = 0;
            payments.forEach(p => {
                if (p.status === 'paid') { 
                    totalRevenue += parseFloat(p.amount) || 0; 
                    successfulPayments++; 
                    if ((p.created_at || '').split('T')[0] === today) {
                        todayRevenue += parseFloat(p.amount) || 0; 
                    }
                }
                else if (p.status === 'pending') {
                    pendingPayments++;
                }
            });
            document.getElementById('totalRevenue').textContent = formatPrice(totalRevenue);
            document.getElementById('todayRevenue').textContent = formatPrice(todayRevenue);
            document.getElementById('successfulPayments').textContent = successfulPayments;
            document.getElementById('pendingPayments').textContent = pendingPayments;
        }

        function renderPayments() {
            const list = document.getElementById('paymentsList');
            let filtered = currentFilter === 'all' ? payments : payments.filter(p => p.status === currentFilter);
            if (!filtered.length) { 
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💳</div><p>Nincsenek fizetések.</p></div>'; 
                return; 
            }
            filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            list.innerHTML = filtered.map(p => {
                const order = orders.find(o => o.order_id === p.order_id);
                const user = order ? users.find(u => u.user_id === order.user_id) : null;
                return `<div class="payment-item">
                    <div class="payment-icon">💳</div>
                    <div class="payment-info">
                        <div class="payment-customer">${user ? user.name : 'Ismeretlen'}</div>
                        <div class="payment-date">${formatDate(p.created_at)}</div>
                        <div class="payment-order">Rendelés: #${p.order_id}</div>
                    </div>
                    <div class="payment-amount">${formatPrice(p.amount)}</div>
                    <div class="payment-method ${p.method}">${getMethodName(p.method)}</div>
                    <div class="payment-status status-${p.status}">${getStatusName(p.status)}</div>
                </div>`;
            }).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderPayments();
        }));

        function getMethodName(m) { 
            return { 
                card: 'Bankkártya', 
                cash: 'Készpénz', 
                paypal: 'PayPal' 
            }[m] || m || 'Ismeretlen'; 
        }
        
        function getStatusName(s) { 
            return { 
                pending: 'Függőben', 
                paid: 'Sikeres', 
                failed: 'Sikertelen' 
            }[s] || s; 
        }
        
        function formatPrice(p) { 
            return new Intl.NumberFormat('hu-HU').format(Math.round(p)) + ' Ft'; 
        }
        
        function formatDate(d) { 
            return d ? new Date(d).toLocaleString('hu-HU') : 'N/A'; 
        }
        
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
