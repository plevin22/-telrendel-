        <section class="dashboard-section">
            <div class="container">
                <h1 class="page-title">Fizetések</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon green">💵</div>
                        <div class="stat-label">Összes bevétel</div>
                        <div class="stat-value" id="totalRevenue">0 Ft</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">📅</div>
                        <div class="stat-label">Mai bevétel</div>
                        <div class="stat-value" id="todayRevenue">0 Ft</div>
                    </div>

                        <div class="stat-icon purple">✅</div>
                        <div class="stat-label">Sikeres fizetések</div>

                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">⏳</div>
                        <div class="stat-label">Függőben lévő</div>

                    </div>
                </div>
                <div class="row justify-content-center">
                    <div class="col-lg-10 col-xl-9">
                        <div class="payments-card">
                            <h2 class="payments-title">Fizetési előzmények</h2>
                            <div class="filter-section">
                                <button class="filter-btn active" data-filter="all">Összes</button>
                                <button class="filter-btn" data-filter="paid">Sikeres</button>
                                <button class="filter-btn" data-filter="pending">Függőben</button>
                                <button class="filter-btn" data-filter="failed">Sikertelen</button>
                            </div>
