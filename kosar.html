
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Kosár</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">Ételrendelés Pécs</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Főoldal</a></li>
        <li class="nav-item"><a class="nav-link" href="regisztrácio.html">Regisztráció</a></li>
        <li class="nav-item"><a class="nav-link" href="kosar.html">Kosár</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
<h2 class="text-danger mb-4">Kosár</h2>

<div class="table-responsive">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
  <th>Étel neve</th>
  <th class="text-center">Mennyiség</th>
  <th>Ár</th>
  <th>Összesen</th>
</tr>
</thead>
<tbody>
<tr>
  <td>Teszt étel</td>


  <td class="text-center">
    <div class="d-flex justify-content-center align-items-center">
      <button class="btn btn-outline-danger quantity-btn" onclick="changeQty(-1)">−</button>
      <span id="qty" class="mx-3 fs-5">1</span>
      <button class="btn btn-outline-success quantity-btn" onclick="changeQty(1)">+</button>
    </div>
  </td>


  <td id="price">1990 Ft</td>


  <td id="total">1990 Ft</td>
</tr>
</tbody>
</table>
</div>

<a href="#" class="btn btn-success btn-lg mt-3">Rendelés leadása</a>
</div>

<script>

let qty = 1;
const basePrice = 1990;


function changeQty(amount) {
  qty += amount;

  if (qty < 1) qty = 1; 

  document.getElementById("qty").textContent = qty;

  const total = qty * basePrice;
  document.getElementById("total").textContent = total + " Ft";
}
</script>

</body>
</html>
